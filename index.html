<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hatsumichi | Official Portfolio</title>
    <style>
        /* 基本設定 */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', sans-serif;
            background-color: #0a0a0a; /* 深い黒 */
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* 背景の装飾（微かな光） */
        body::before {
            content: "";
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(0, 123, 255, 0.15) 0%, rgba(0,0,0,0) 70%);
            top: 10%;
            left: 10%;
            z-index: -1;
        }

        /* メインコンテナ */
        .container {
            text-align: center;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeIn 1.2s ease-out forwards;
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 名前部分 */
        h1 {
            font-size: 4rem;
            letter-spacing: 0.5rem;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            background: linear-gradient(45deg, #fff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* 肩書き・スローガン */
        .title {
            font-size: 1.1rem;
            color: #888;
            letter-spacing: 0.2rem;
            margin-bottom: 2rem;
        }

        /* 区切り線 */
        .line {
            width: 50px;
            height: 2px;
            background-color: #007bff;
            margin: 0 auto 2rem;
        }

        /* プロフィール詳細 */
        .description {
            max-width: 400px;
            line-height: 1.8;
            font-size: 0.9rem;
            color: #ccc;
            margin-bottom: 3rem;
        }

        /* リンクボタン */
        .links a {
            text-decoration: none;
            color: #fff;
            border: 1px solid #444;
            padding: 10px 25px;
            border-radius: 30px;
            transition: all 0.3s;
            font-size: 0.8rem;
            margin: 0 10px;
        }

        .links a:hover {
            background-color: #fff;
            color: #000;
            border-color: #fff;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>初道</h1>
        <p class="title">HATSUMICHI</p>
        <div class="line"></div>
        
        <div class="description">
            <p>
                新しい道を切り拓く、静かな情熱。<br>
                独自の視点で、価値ある瞬間を創造する。
            </p>
        </div>

        <div class="links">
            <a href="#">WORKS</a>
            <a href="#">CONTACT</a>
        </div>
    </div>

</body>
</html>
